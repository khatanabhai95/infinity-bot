<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Infinity Bot made by Khatanabhai95</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: linear-gradient(-45deg, #020617, #0f172a, #020617);
  background-size: 400% 400%;
  animation: bg 10s ease infinite;
  color: white;
  text-align: center;
}

@keyframes bg {
  0% {background-position: 0%}
  50% {background-position: 100%}
  100% {background-position: 0%}
}

nav {
  display: flex;
  justify-content: space-between;
  padding: 15px 30px;
  background: rgba(0,0,0,0.4);
}

.logo { color: #38bdf8; font-weight: bold; }

.hero {
  padding: 100px 20px;
}

.btn {
  padding: 12px 25px;
  background: #38bdf8;
  color: black;
  border-radius: 10px;
  text-decoration: none;
  margin: 10px;
  transition: 0.3s;
}

.btn:hover {
  background: #0ea5e9;
  transform: scale(1.05);
}

.section {
  padding: 50px;
}

.card {
  display: inline-block;
  margin: 15px;
  padding: 20px;
  width: 250px;
  background: #0f172a;
  border-radius: 15px;
  box-shadow: 0 0 15px rgba(56,189,248,0.3);
  transition: 0.3s;
}

.card:hover {
  transform: translateY(-10px);
}

footer {
  padding: 20px;
  color: #64748b;
}
</style>
</head>

<body>

<nav>
  <div class="logo">🤖 Infinity Bot</div>
</nav>

<div class="hero">
  <h1>Powerful Discord Bot</h1>
  <p>Music • Moderation • Fun</p>

  <a class="btn" href="YOUR_INVITE_LINK" target="_blank">Invite</a>
  <a class="btn" href="YOUR_SUPPORT_SERVER" target="_blank">Support</a>
</div>

<div class="section">
  <h2>📊 Stats</h2>
  <p id="servers">Servers: Loading...</p>
</div>

<div class="section">
  <h2>✨ Features</h2>

  <div class="card">🎵 Music System</div>
  <div class="card">🛡️ Moderation</div>
  <div class="card">🎮 Fun Commands</div>
</div>

<div class="section">
  <h2>📄 Commands</h2>
  <p>!play, !stop, !ping, !clear, !hello</p>
</div>

<footer>
  <p>Made by Khatanabhai95</p>
</footer>

<script>
// fake stats (replace later with real API)
document.getElementById("servers").innerText = "Servers: 25+";
</script>

</body>
</html>
