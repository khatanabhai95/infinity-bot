<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Infinity Bot</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  color: white;
  text-align: center;
}

/* 🌌 Star background */
#stars {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  z-index: -1;
  background: #020617;
}

/* 🔝 Navbar */
nav {
  display: flex;
  justify-content: space-between;
  padding: 15px 30px;
  background: rgba(0,0,0,0.4);
}

nav a {
  color: #38bdf8;
  text-decoration: none;
  margin: 0 10px;
}

/* 🚀 Hero section */
.hero {
  padding: 100px 20px;
}

.btn {
  padding: 12px 25px;
  background: #38bdf8;
  color: black;
  border-radius: 10px;
  text-decoration: none;
  margin: 10px;
  transition: 0.3s;
}

.btn:hover {
  transform: scale(1.05);
  background: #0ea5e9;
}

/* 💎 Cards */
.section {
  padding: 60px 20px;
}

.card {
  display: inline-block;
  width: 250px;
  margin: 15px;
  padding: 20px;
  background: rgba(15,23,42,0.8);
  border-radius: 15px;
  box-shadow: 0 0 15px rgba(56,189,248,0.3);
  transition: 0.3s;
}

.card:hover {
  transform: translateY(-10px);
}
</style>
</head>

<body>

<!-- 🌌 Background -->
<canvas id="stars"></canvas>

<!-- 🔝 Navbar -->
<nav>
  <div>🤖 Infinity Bot</div>
  <div>
    <a href="index.html">Home</a>
    <a href="commands.html">Commands</a>
  </div>
</nav>

<!-- 🚀 Hero -->
<div class="hero">
  <h1>Infinity Bot</h1>
  <p>Music • Moderation • Fun</p>

  <a class="btn" href="YOUR_INVITE_LINK" target="_blank">Invite</a>
  <a class="btn" href="YOUR_SUPPORT_SERVER" target="_blank">Support</a>
</div>

<!-- 💎 Features -->
<div class="section">
  <h2>✨ Features</h2>

  <div class="card">🎵 Music System</div>
  <div class="card">🛡️ Moderation</div>
  <div class="card">🎮 Fun Commands</div>
</div>

<!-- 🌌 Starfield Script -->
<script>
const canvas = document.getElementById("stars");
const ctx = canvas.getContext("2d");

let w = canvas.width = window.innerWidth;
let h = canvas.height = window.innerHeight;

let mouse = { x: w/2, y: h/2 };

window.addEventListener("mousemove", (e) => {
  mouse.x = e.clientX;
  mouse.y = e.clientY;
});

let stars = [];

for (let i = 0; i < 140; i++) {
  stars.push({
    x: Math.random() * w - w/2,
    y: Math.random() * h - h/2,
    z: Math.random() * w,
    baseX: Math.random() * w - w/2,
    baseY: Math.random() * h - h/2
  });
}

function animate() {
  ctx.fillStyle = "#020617";
  ctx.fillRect(0, 0, w, h);

  stars.forEach(star => {
    star.z -= 2;
    if (star.z <= 0) {
      star.z = w;
      star.x = star.baseX;
      star.y = star.baseY;
    }

    let mx = (mouse.x - w/2) * 0.0005 * star.z;
    let my = (mouse.y - h/2) * 0.0005 * star.z;

    let k = 128.0 / star.z;
    let px = (star.x + mx) * k + w/2;
    let py = (star.y + my) * k + h/2;

    let size = (1 - star.z / w) * 3;

    ctx.beginPath();
    ctx.arc(px, py, size, 0, Math.PI * 2);
    ctx.fillStyle = "rgba(56,189,248,0.9)";
    ctx.shadowBlur = 8;
    ctx.shadowColor = "#38bdf8";
    ctx.fill();
  });

  requestAnimationFrame(animate);
}

animate();

window.addEventListener("resize", () => {
  w = canvas.width = window.innerWidth;
  h = canvas.height = window.innerHeight;
});
</script>

</body>
</html>
